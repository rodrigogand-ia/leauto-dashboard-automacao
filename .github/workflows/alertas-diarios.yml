name: Alertas Diários Leauto

on:
  schedule:
    - cron: '0 23 * * 1-6'
  workflow_dispatch:

jobs:
  enviar-alertas:
    runs-on: ubuntu-latest
    steps:
      - name: Enviar alerta de não preenchimento
        run: |
          curl -s -X POST https://api.emailjs.com/api/v1.0/email/send \
            -H "Content-Type: application/json" \
            -d '{
              "service_id": "service_ris6tjh",
              "template_id": "template_4dii26y",
              "user_id": "wVGd8W4m0FNcr-FIh",
              "accessToken": "U0qZgyOBftACxdoP96bGW",
              "template_params": {
                "to_email": "rodrigoleta@grupoleauto.com.br",
                "data": "'"$(TZ='America/Sao_Paulo' date +'%d/%m/%Y')"'",
                "lojas_alerta": "Verificar dashboard para detalhes das lojas sem preenchimento"
              }
            }'

      - name: Enviar report Renault — Rodrigo
        run: |
          curl -s -X POST https://api.emailjs.com/api/v1.0/email/send \
            -H "Content-Type: application/json" \
            -d '{
              "service_id": "service_ris6tjh",
              "template_id": "template_7r26vho",
              "user_id": "wVGd8W4m0FNcr-FIh",
              "accessToken": "U0qZgyOBftACxdoP96bGW",
              "template_params": {
                "to_email": "rodrigoleta@grupoleauto.com.br",
                "data": "'"$(TZ='America/Sao_Paulo' date +'%d/%m/%Y')"'",
                "ab_pass":"-","ab_leads":"-","ab_vend":"-","ab_fat":"-","ab_modelos_pass":"-","ab_modelos_vend":"-",
                "bt_pass":"-","bt_leads":"-","bt_vend":"-","bt_fat":"-","bt_modelos_pass":"-","bt_modelos_vend":"-",
                "pn_pass":"-","pn_leads":"-","pn_vend":"-","pn_fat":"-","pn_modelos_pass":"-","pn_modelos_vend":"-",
                "tj_pass":"-","tj_leads":"-","tj_vend":"-","tj_fat":"-","tj_modelos_pass":"-","tj_modelos_vend":"-",
                "total_pass":"-","total_vend":"-","conv":"-","top_modelos_pass":"-","top_modelos_vend":"-"
              }
            }'

      - name: Enviar report Renault — Danyke
        run: |
          curl -s -X POST https://api.emailjs.com/api/v1.0/email/send \
            -H "Content-Type: application/json" \
            -d '{
              "service_id": "service_ris6tjh",
              "template_id": "template_7r26vho",
              "user_id": "wVGd8W4m0FNcr-FIh",
              "accessToken": "U0qZgyOBftACxdoP96bGW",
              "template_params": {
                "to_email": "danyke.livramento@renault.com",
                "data": "'"$(TZ='America/Sao_Paulo' date +'%d/%m/%Y')"'",
                "ab_pass":"-","ab_leads":"-","ab_vend":"-","ab_fat":"-","ab_modelos_pass":"-","ab_modelos_vend":"-",
                "bt_pass":"-","bt_leads":"-","bt_vend":"-","bt_fat":"-","bt_modelos_pass":"-","bt_modelos_vend":"-",
                "pn_pass":"-","pn_leads":"-","pn_vend":"-","pn_fat":"-","pn_modelos_pass":"-","pn_modelos_vend":"-",
                "tj_pass":"-","tj_leads":"-","tj_vend":"-","tj_fat":"-","tj_modelos_pass":"-","tj_modelos_vend":"-",
                "total_pass":"-","total_vend":"-","conv":"-","top_modelos_pass":"-","top_modelos_vend":"-"
