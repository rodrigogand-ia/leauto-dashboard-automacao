name: Alertas Diários Leauto

on:
  schedule:
    - cron: '0 23 * * 1-6'
  workflow_dispatch:

jobs:
  enviar-alertas:
    runs-on: ubuntu-latest
    steps:
      - name: Enviar alerta de não preenchimento
        run: |
          DATA=$(TZ='America/Sao_Paulo' date +'%d/%m/%Y')
          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer re_ELq6zCkK_4bvypE6uuuxtJW8pQZR84qoN" \
            -H "Content-Type: application/json" \
            -d "{
              \"from\": \"Leauto Dashboard <onboarding@resend.dev>\",
              \"to\": [\"rodrigoleta@grupoleauto.com.br\"],
              \"subject\": \"⚠️ Leauto — Lojas sem preenchimento em $DATA\",
              \"html\": \"<h2>⚠️ Alerta de Não Preenchimento</h2><p>Olá Rodrigo,</p><p>Uma ou mais lojas não preencheram os dados de hoje (<strong>$DATA</strong>).</p><p>Acesse o dashboard para verificar:</p><p><a href='https://leauto-dashboard.netlify.app'>👉 Abrir Dashboard</a></p><br><small>— Sistema Leauto</small>\"
            }"

      - name: Enviar report Renault — Rodrigo
        run: |
          DATA=$(TZ='America/Sao_Paulo' date +'%d/%m/%Y')
          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer re_ELq6zCkK_4bvypE6uuuxtJW8pQZR84qoN" \
            -H "Content-Type: application/json" \
            -d "{
              \"from\": \"Leauto Dashboard <onboarding@resend.dev>\",
              \"to\": [\"rodrigoleta@grupoleauto.com.br\"],
              \"subject\": \"📊 Renault — Report do Dia $DATA\",
              \"html\": \"<h2>📊 Report Diário Renault</h2><p><strong>Data:</strong> $DATA</p><br><p>Os dados detalhados por loja estão disponíveis no dashboard:</p><p><a href='https://leauto-dashboard.netlify.app'>👉 Abrir Dashboard</a></p><br><small>— Sistema Leauto</small>\"
            }"

      - name: Enviar report Renault — Danyke
        run: |
          DATA=$(TZ='America/Sao_Paulo' date +'%d/%m/%Y')
          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer re_ELq6zCkK_4bvypE6uuuxtJW8pQZR84qoN" \
            -H "Content-Type: application/json" \
            -d "{
              \"from\": \"Leauto Dashboard <onboarding@resend.dev>\",
              \"to\": [\"danyke.livramento@renault.com\"],
              \"subject\": \"📊 Renault — Report do Dia $DATA\",
              \"html\": \"<h2>📊 Report Diário Renault</h2><p><strong>Data:</strong> $DATA</p><br><p>Os dados detalhados por loja estão disponíveis no dashboard:</p><p><a href='https://leauto-dashboard.netlify.app'>👉 Abrir Dashboard</a></p><br><small>— Sistema Leauto</small>\"
            }"
