name: Alertas Diários e Backup Leauto

on:
  schedule:
    - cron: '0 23 * * 1-6'
  workflow_dispatch:

jobs:
  backup-firebase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Instalar dependências
        run: npm install firebase-admin googleapis

      - name: Executar backup Firebase → Google Drive
        run: |
          node -e "
          const admin = require('firebase-admin');
          const { google } = require('googleapis');
          const fs = require('fs');

          const serviceAccount = JSON.parse(process.env.GOOGLE_SERVICE_ACCOUNT);

          // Init Firebase
          admin.initializeApp({
            credential: admin.credential.cert(serviceAccount)
          });
          const db = admin.firestore();

          // Init Google Drive
          const auth = new google.auth.GoogleAuth({
            credentials: serviceAccount,
            scopes: ['https://www.googleapis.com/auth/drive.file']
          });
          const drive = google.drive({ version: 'v3', auth });

          async function run() {
            // Buscar todos os documentos
            const snapshot = await db.collection('dados').get();
            const backup = {};
            snapshot.forEach(doc => { backup[doc.id] = doc.data(); });

            // Salvar JSON
            const hoje = new Date().toLocaleDateString('pt-BR', {timeZone: 'America/Sao_Paulo'}).replace(/\//g,'-');
            const filename = 'backup-leauto-' + hoje + '.json';
            fs.writeFileSync(filename, JSON.stringify(backup, null, 2));
            console.log('Backup gerado:', filename, '- Documentos:', Object.keys(backup).length);

            // Upload para Google Drive
            const res = await drive.files.create({
              requestBody: {
                name: filename,
                parents: [process.env.GOOGLE_DRIVE_FOLDER_ID]
              },
              media: {
                mimeType: 'application/json',
                body: fs.createReadStream(filename)
              }
            });
            console.log('Upload concluído! File ID:', res.data.id);
          }
          run().catch(e => { console.error(e); process.exit(1); });
          "
        env:
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}

  enviar-emails:
    runs-on: ubuntu-latest
    needs: backup-firebase
    steps:
      - name: Enviar alerta de não preenchimento
        run: |
          DATA=$(TZ='America/Sao_Paulo' date +'%d/%m/%Y')
          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"from\": \"Leauto Dashboard <onboarding@resend.dev>\",
              \"to\": [\"rodrigoleta@grupoleauto.com.br\"],
              \"subject\": \"⚠️ Leauto — Lojas sem preenchimento em $DATA\",
              \"html\": \"<h2>⚠️ Alerta de Não Preenchimento</h2><p>Olá Rodrigo,</p><p>Uma ou mais lojas não preencheram os dados de hoje (<strong>$DATA</strong>).</p><p><a href='https://leauto-dashboard.netlify.app'>👉 Abrir Dashboard</a></p><br><small>— Sistema Leauto</small>\"
            }"

      - name: Enviar report Renault — Rodrigo
        run: |
          DATA=$(TZ='America/Sao_Paulo' date +'%d/%m/%Y')
          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"from\": \"Leauto Dashboard <onboarding@resend.dev>\",
              \"to\": [\"rodrigoleta@grupoleauto.com.br\"],
              \"subject\": \"📊 Renault — Report do Dia $DATA\",
              \"html\": \"<h2>📊 Report Diário Renault</h2><p><strong>Data:</strong> $DATA</p><p>Acesse o dashboard para ver os dados detalhados por loja:</p><p><a href='https://leauto-dashboard.netlify.app'>👉 Abrir Dashboard</a></p><br><small>— Sistema Leauto</small>\"
            }"

      - name: Enviar report Renault — Danyke
        run: |
          DATA=$(TZ='America/Sao_Paulo' date +'%d/%m/%Y')
          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"from\": \"Leauto Dashboard <onboarding@resend.dev>\",
              \"to\": [\"danyke.livramento@renault.com\"],
              \"subject\": \"📊 Renault — Report do Dia $DATA\",
              \"html\": \"<h2>📊 Report Diário Renault</h2><p><strong>Data:</strong> $DATA</p><p>Acesse o dashboard para ver os dados detalhados por loja:</p><p><a href='https://leauto-dashboard.netlify.app'>👉 Abrir Dashboard</a></p><br><small>— Sistema Leauto</small>\"
            }"
